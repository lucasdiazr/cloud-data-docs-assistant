# docker-compose.yml — entorno local de cloud-data-docs-assistant
#
# Servicios:
#   - postgres: PostgreSQL 16 con la extensión pgvector (drop-in usando
#     la imagen oficial pgvector/pgvector). Las extensiones se crean
#     automáticamente vía init-db.sql.
#   - langfuse: pendiente de activar cuando se aborde la fase de
#     observabilidad. Ver bloque comentado al final del archivo.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cloud-data-docs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------
  # Langfuse (self-hosted) — se activará en la fase de observabilidad.
  # Cuando llegue el momento, descomentar y completar configuración.
  # ---------------------------------------------------------------
  # langfuse:
  #   image: langfuse/langfuse:latest
  #   container_name: cloud-data-docs-langfuse
  #   restart: unless-stopped
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   environment:
  #     DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/langfuse
  #     NEXTAUTH_SECRET: changeme
  #     SALT: changeme
  #     NEXTAUTH_URL: http://localhost:3000
  #   ports:
  #     - "3000:3000"

volumes:
  postgres_data:
    name: cloud-data-docs-postgres-data
